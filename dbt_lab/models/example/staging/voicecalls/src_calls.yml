version: 2

sources:
  - name: raw_voicecalls
    description: "Raw voice calls data source, a single raw table with duplicates."
    schema: "{{ var('raw_schema', 'public') }}"
    tables:
      - name: raw_table
        description: "Contains the raw voice calls data, including duplicates."
        columns:
          - name: call_id
            description: "The primary key for this table"
            data_type: string
            data_tests:
              - not_null
          - name: event_type
            description: "Type of the event (e.g., call_initiated, call_ended)"
            data_tests:
              - not_null
              - accepted_values:
                  values: ['call_initiated', 'information_provided', 'call_answered', 'call_ended']
          - name: timestamp
            description: "The timestamp of the event of some call"
            data_tests:
              - not_null
          - name: name
            description: "The name of the caller."
            data_tests:
              - not_null
          - name: company
            description: "The company of the caller."
            data_tests:
              - not_null
  - name: dagster
    description: "Dagster-owned upstream assets exposed to dbt for lineage/dependencies."
    schema: "{{ var('raw_schema', 'public') }}"
    tables:
      - name: raw_table
        description: "The raw data table created by the `raw_dbt_source` asset."

models:
  - name: stg_deduplicate_raw
    description: "Raw data with duplicates removed"
    columns:
      - name: call_id
        description: "The primary key for this table"
        data_type: string
        data_tests:
          - not_null
      - name: event_type
        description: "Type of the event (e.g., call_initiated, call_ended)"
        data_type: string
        data_tests:
          - not_null
      - name: timestamp
        description: "The timestamp of the event of some call"
        data_type: timestamp
        data_tests:
          - not_null
      - name: name
        description: "The name of the caller."
        data_type: string
        data_tests:
          - not_null
      - name: company
        description: "The company of the caller."
        data_type: string
        data_tests:
          - not_null
      
